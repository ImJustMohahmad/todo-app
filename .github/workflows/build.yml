name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK with Buildozer
        env:
          ANDROID_SDK_LICENSE_ACCEPT: "y"
        run: |
          docker run --rm \
            -e ANDROID_SDK_LICENSE_ACCEPT=y \
            -v "${{ github.workspace }}:/home/user/hostcwd" \
            kivy/buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: todolist-apk
          path: bin/*.apk
