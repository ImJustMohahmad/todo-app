name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK with Buildozer
        run: |
          mkdir -p .buildozer/android/platform
          docker run --rm \
            -v "${{ github.workspace }}:/home/user/hostcwd" \
            kivy/buildozer /bin/bash -c "
              mkdir -p /home/user/.buildozer/android/platform/android-sdk/licenses &&
              echo '24333f8a63b6825ea9c5514f83c2829b004d1fee' > /home/user/.buildozer/android/platform/android-sdk/licenses/android-sdk-license &&
              echo '84831b9409646a918e30573bab4c9c91346d8abd' >> /home/user/.buildozer/android/platform/android-sdk/licenses/android-sdk-license &&
              echo 'd56f5187479451eabf01fb78af6dfcb131a6481e' > /home/user/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license &&
              buildozer android debug
            "

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: todolist-apk
          path: bin/*.apk
